<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square in near-black ink -->
  <rect width="32" height="32" rx="7" fill="#1A1916"/>
  <!-- Geometric "e" lettermark: arc body + crossbar -->
  <!-- Arc: circle centered at (16,17) r=9.5, opening on upper-right/lower-right ~30° -->
  <path
    d="M 24.2 12.25 A 9.5 9.5 0 1 0 24.2 21.75"
    fill="none"
    stroke="#F7F4EF"
    stroke-width="2.6"
    stroke-linecap="round"
  />
  <!-- Crossbar: from left edge of circle to the opening -->
  <line
    x1="6.5" y1="17"
    x2="24.5" y2="17"
    stroke="#F7F4EF"
    stroke-width="2.6"
    stroke-linecap="round"
  />
</svg>

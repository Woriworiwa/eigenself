<div class="app-shell">
  @switch (currentState()) {

    @case ('onboarding') {
      <app-onboarding
        [cvText]="cvText()"
        [cvFileName]="cvFileName()"
        [cvUploading]="cvUploading()"
        [cvError]="cvError()"
        [supportsSonic]="supportsSonic()"
        (modeSelected)="selectMode($event)"
        (cvFileChanged)="uploadCV($event)"
        (cvRemoved)="removeCV()" />
    }

    @case ('interview') {
      <app-interview-state
        [messages]="messages()"
        [agentTyping]="agentTyping()"
        [interviewMode]="interviewMode()"
        [isRecording]="isRecording()"
        [isSonicSpeaking]="isSonicSpeaking()"
        [isSonicListening]="isSonicListening()"
        [voiceTranscript]="voiceTranscript()"
        [conversationComplete]="conversationComplete()"
        [currentTextInput]="currentTextInput()"
        [isPaused]="sonicPaused()"
        [useAgent]="useAgent()"
        (endInterview)="transitionToProcessing()"
        (micClicked)="onMicClicked()"
        (pauseClicked)="onPauseClicked()"
        (textChanged)="currentTextInput.set($event)"
        (textKeydown)="handleTextKeydown($event)"
        (textSubmit)="submitTextAnswer()"
        (sonicTextSubmit)="sendSonicText()"
        (modeToggled)="interviewMode.set(interviewMode() === 'text' ? 'sonic' : 'text')"
        (agentToggled)="useAgent.set(!useAgent())" />
    }

    @case ('processing') {
      <app-processing
        [showNamePrompt]="showNamePrompt()"
        [processingStatus]="processingStatus()"
        (nameConfirmed)="onNameConfirmed($event)" />
    }

    @case ('reveal') {
      <app-reveal
        [identityDoc]="identityDoc()"
        [copyConfirmation]="copyConfirmation()"
        [profileUrl]="profileUrl()"
        [profilePublishing]="profilePublishing()"
        [profilePublishError]="profilePublishError()"
        [profileUrlCopied]="profileUrlCopied()"
        (copyDocumentClicked)="copyDocument()"
        (downloadDocumentClicked)="downloadDocument()"
        (publishProfileClicked)="publishProfile()"
        (copyProfileUrlClicked)="copyProfileUrl()" />
    }

  }
</div>

<div class="processing-shell" role="main" aria-label="Building your identity document">

  @if (!showNamePrompt()) {
    <div class="dots-field" aria-hidden="true" role="presentation">
      @for (dot of dots(); track $index) {
        <div
          class="processing-dot"
          [ngStyle]="{
            width:   dot.size + 'px',
            height:  dot.size + 'px',
            opacity: dot.opacity,
            transform: 'translate(' + dot.x + 'px, ' + dot.y + 'px)'
          }"
        ></div>
      }
    </div>

    <div class="processing-inner">
      <p class="processing-message" aria-live="polite">{{ displayMessage() }}</p>
    </div>
  }

  @if (showNamePrompt()) {
    <div class="name-prompt-card">
      <p class="name-prompt-label">One last thing —</p>
      <h2 class="name-prompt-heading">What is your name?</h2>
      <div class="name-input-row">
        <label for="name-input" class="visually-hidden">Your full name</label>
        <input
          id="name-input"
          class="name-input"
          type="text"
          [value]="nameInput()"
          (input)="onNameInput($event)"
          (keydown)="handleNameKeydown($event)"
          placeholder="Your full name"
          autocomplete="name"
          autofocus
        >
        <button
          class="name-submit-btn"
          type="button"
          (click)="confirmName()"
          aria-label="Continue"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>
  }

</div>
